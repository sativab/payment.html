 <!DOCTYPE html>
<html>
<head>
<title>Project Loan Payment Calculator</title>


<script>
function payment() {
let PV = document.getElementById("PV").value;
let r = document.getElementById("interest").value;
let n = document.getElementById("Y").value;
let P = ((r/100/12) * PV)/(1-(1+(r/100/12))**-(n*12));
document.getElementById("ans").innerHTML = "If you take out a loan for $"+ PV +" for "+ n +" years at "+ r +" %, your monthly payment would be $" + P.toFixed(2);
}
</script>

</head>
<body>
<h3>Loan Payment Calculator</h3>

<p> Present Value -- Amount you wish to borrow: <input id="PV"> <br>
<br> Years: <input id="Y"> <br>
<br> % -- Annual interest rate: <input id="interest"> <br>
<button onclick="payment()"> Calculate the Monthly Payment </button>
</p>
   <p id="ans"> </p>


</body>
</html>
